# Configuration Nginx pour le Portail de Sécurité Tanger Alliance
# À placer dans /etc/nginx/sites-available/
# Puis créer un lien symbolique dans /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name portail-securite.tangeralliance.com;  # Remplacer par votre nom de domaine

    # Redirection vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Optimisation des performances
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

server {
    listen 443 ssl http2;
    server_name portail-securite.tangeralliance.com;  # Remplacer par votre nom de domaine

    # Configuration SSL
    ssl_certificate     /etc/letsencrypt/live/portail-securite.tangeralliance.com/fullchain.pem;  # À modifier
    ssl_certificate_key /etc/letsencrypt/live/portail-securite.tangeralliance.com/privkey.pem;    # À modifier
    
    # Paramètres de sécurité SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # En-têtes HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; img-src 'self'; style-src 'self'; font-src 'self'; connect-src 'self';";

    # Logs
    access_log /var/log/nginx/portail_securite_access.log;
    error_log /var/log/nginx/portail_securite_error.log;

    # Fichiers statiques
    location /static/ {
        alias /chemin/vers/portail_securite/static_collected/;  # À modifier
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Favicon
    location /favicon.ico {
        alias /chemin/vers/portail_securite/static_collected/favicon.ico;  # À modifier
        access_log off;
        log_not_found off;
    }

    # Proxy principal vers l'application Flask/Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;  # Limite de taille pour les téléchargements
    }

    # Configuration pour letsencrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
