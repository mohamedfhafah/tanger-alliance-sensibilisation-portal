name: Tests Python

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # Service PostgreSQL pour les tests d'intégration
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portail_securite_test
        ports:
          - 5432:5432
        # Vérifier que PostgreSQL est opérationnel avant de poursuivre
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest coverage
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Create SQLite test database
      run: |
        # Initialiser la base de données SQLite pour les tests
        python -c "from app import create_app, db; app = create_app('testing'); app.app_context().push(); db.create_all()"
    
    - name: Test with unittest
      run: |
        # Exécuter les tests unitaires avec rapport de couverture
        python -m coverage run scripts/run_tests.py
        python -m coverage report
        python -m coverage xml
      env:
        FLASK_CONFIG: testing
        FLASK_APP: app.py
        TEST_DATABASE_URL: sqlite:///:memory:
        POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/portail_securite_test
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Test database migration to PostgreSQL
      run: |
        # Préparer la base de test SQLite
        python scripts/create_tables.py
        
        # Exécuter la migration de SQLite vers PostgreSQL
        python scripts/migrate_to_postgres.py --sqlite-db tanger_alliance.db --pg-url postgresql://postgres:postgres@localhost:5432/portail_securite_test
        
        # Vérifier que la migration a réussi
        python -c "from sqlalchemy import create_engine; e = create_engine('postgresql://postgres:postgres@localhost:5432/portail_securite_test'); conn = e.connect(); result = conn.execute('SELECT COUNT(*) FROM alembic_version').fetchone(); print(f'Alembic version rows: {result[0]}'); conn.close(); assert result[0] > 0, 'Migration verification failed!'"
      env:
        FLASK_CONFIG: testing
        FLASK_APP: app.py
