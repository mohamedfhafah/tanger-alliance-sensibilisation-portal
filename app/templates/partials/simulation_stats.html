{% macro render_simulation_stats(stats) %}
<div class="ta-surface-flat dashboard-panel mb-4 shadow-sm p-2">
  <div class="card-header border-0 bg-transparent text-primary d-flex align-items-center justify-content-between">
    <h4 class="card-title fw-bold m-0 fs-5 pb-2"><i class="fas fa-flask me-2"></i>Statistiques des simulations</h4>
  </div>
  <div class="card-body">
    <div class="ta-mini-stat-grid">
      <div class="ta-mini-stat">
        <span class="ta-mini-stat-label">Total d'essais</span>
        <strong class="ta-mini-stat-value">{{ stats.total }}</strong>
      </div>
      <div class="ta-mini-stat">
        <span class="ta-mini-stat-label">Succès</span>
        <strong class="ta-mini-stat-value">{{ stats.success }}</strong>
      </div>
      <div class="ta-mini-stat">
        <span class="ta-mini-stat-label">Taux de réussite</span>
        <strong class="ta-mini-stat-value">{{ stats.rate }}%</strong>
      </div>
      <div class="ta-mini-stat">
        <span class="ta-mini-stat-label">Dernier essai</span>
        <strong class="ta-mini-stat-value ta-mini-stat-value--small">{{ stats.last.strftime('%d/%m/%Y') if stats.last else 'N/A' }}</strong>
      </div>
    </div>
  </div>
</div>
{% endmacro %}
