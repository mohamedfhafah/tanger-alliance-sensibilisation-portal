<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="55" fill="url(#badgeGradient)" stroke="#B8860B" stroke-width="3"/>
  
  <!-- Inner circle -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Star shape -->
  <polygon points="60,25 67,45 87,45 72,58 78,78 60,68 42,78 48,58 33,45 53,45" 
           fill="#B8860B" stroke="#8B4513" stroke-width="1"/>
  
  <!-- Text -->
  <text x="60" y="95" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="12" font-weight="bold" fill="#B8860B">BADGE</text>
</svg>