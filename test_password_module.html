<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Password Module Functions</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .strength-meter { height: 10px; border-radius: 5px; margin: 10px 0; transition: all 0.3s ease; }
        .strength-weak { background: linear-gradient(90deg, #dc3545 0%, #ff6b6b 100%); }
        .strength-medium { background: linear-gradient(90deg, #ffc107 0%, #ffeb3b 100%); }
        .strength-strong { background: linear-gradient(90deg, #28a745 0%, #4caf50 100%); }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; }
    </style>
</head>
<body>
    <h1>Test du Module de Mot de Passe</h1>
    
    <div class="test-section">
        <h2>Test 1: Évaluateur de Force de Mot de Passe</h2>
        <input type="password" id="testPassword" placeholder="Entrez un mot de passe de test" style="width: 300px; padding: 8px;">
        <button onclick="testPasswordStrength()">Tester</button>
        <div id="testResult" class="result"></div>
        <div class="strength-meter" id="testMeter"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Générateur de Mot de Passe</h2>
        <button onclick="testPasswordGenerator()">Générer un mot de passe</button>
        <div id="generatedResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Navigation Bootstrap Tabs</h2>
        <p>Toutes les sections ont-elles les attributs aria-labelledby ? 
        <button onclick="testBootstrapTabs()">Vérifier</button></p>
        <div id="tabsResult" class="result"></div>
    </div>

    <script>
        // Test de l'évaluateur de force de mot de passe
        function testPasswordStrength() {
            const password = document.getElementById('testPassword').value;
            const meter = document.getElementById('testMeter');
            const result = document.getElementById('testResult');
            
            if (!password) {
                result.innerHTML = '<span style="color: red;">Veuillez entrer un mot de passe</span>';
                return;
            }
            
            let score = 0;
            let details = [];
            
            // Critères d'évaluation (copiés du module principal)
            if (password.length >= 12) {
                score += 25;
                details.push('✓ Longueur suffisante (12+ caractères)');
            } else {
                details.push('✗ Trop court (moins de 12 caractères)');
            }
            
            if (/[A-Z]/.test(password)) {
                score += 20;
                details.push('✓ Contient des majuscules');
            } else {
                details.push('✗ Aucune majuscule');
            }
            
            if (/[a-z]/.test(password)) {
                score += 20;
                details.push('✓ Contient des minuscules');
            } else {
                details.push('✗ Aucune minuscule');
            }
            
            if (/[0-9]/.test(password)) {
                score += 20;
                details.push('✓ Contient des chiffres');
            } else {
                details.push('✗ Aucun chiffre');
            }
            
            if (/[^A-Za-z0-9]/.test(password)) {
                score += 15;
                details.push('✓ Contient des caractères spéciaux');
            } else {
                details.push('✗ Aucun caractère spécial');
            }
            
            // Évaluation finale
            let strengthClass, strengthLabel;
            if (score < 40) {
                strengthClass = 'strength-weak';
                strengthLabel = 'Faible';
            } else if (score < 70) {
                strengthClass = 'strength-medium';
                strengthLabel = 'Moyen';
            } else {
                strengthClass = 'strength-strong';
                strengthLabel = 'Fort';
            }
            
            // Mise à jour de l'affichage
            meter.className = `strength-meter ${strengthClass}`;
            meter.style.width = Math.min(score, 100) + '%';
            result.innerHTML = `
                <strong>Force: ${strengthLabel} (${score}/100)</strong><br>
                ${details.join('<br>')}
            `;
        }
        
        // Test du générateur de mot de passe
        function testPasswordGenerator() {
            const length = 16;
            const includeUpper = true;
            const includeLower = true;
            const includeNumbers = true;
            const includeSymbols = true;
            
            let charset = '';
            if (includeUpper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (includeLower) charset += 'abcdefghijklmnopqrstuvwxyz';
            if (includeNumbers) charset += '0123456789';
            if (includeSymbols) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            let password = '';
            for (let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            document.getElementById('generatedResult').innerHTML = `
                <strong>Mot de passe généré:</strong> <code>${password}</code><br>
                <strong>Longueur:</strong> ${password.length} caractères<br>
                <strong>Types de caractères:</strong> ${charset.length} possibles
            `;
        }
        
        // Test des attributs Bootstrap tabs
        function testBootstrapTabs() {
            const tabsStatus = {
                'intro': 'intro-tab',
                'risks': 'risks-tab', 
                'creation': 'creation-tab',
                'managers': 'managers-tab',
                '2fa': '2fa-tab',
                'simulator': 'simulator-tab'
            };
            
            let results = [];
            let allCorrect = true;
            
            for (const [sectionId, expectedLabel] of Object.entries(tabsStatus)) {
                results.push(`${sectionId}: Attribut aria-labelledby devrait être "${expectedLabel}"`);
            }
            
            document.getElementById('tabsResult').innerHTML = `
                <strong>Vérifications des attributs aria-labelledby:</strong><br>
                ${results.join('<br>')}<br><br>
                <strong>Statut:</strong> Les attributs doivent être vérifiés dans le module principal
            `;
        }
    </script>
</body>
</html>
